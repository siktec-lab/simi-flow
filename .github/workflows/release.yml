name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write  # OIDC for PyPI + npm

jobs:
  # ── crates.io ──────────────────────────────────────────────────
  crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Authenticate via OIDC
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish
        run: cargo publish

  # ── PyPI ────────────────────────────────────────────────────────
  pypi:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build wheel
        run: |
          pip install maturin
          maturin build --release --features python --target ${{ matrix.target }}
          pip install target/wheels/*.whl

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: target/wheels/

  # ── npm ─────────────────────────────────────────────────────────
  npm:
    name: Build & publish to npm
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Build addon
        working-directory: js
        run: |
          npm install
          napi build --platform --release --target ${{ matrix.target }} --manifest-path ../Cargo.toml -F nodejs -o .

      - name: Publish
        working-directory: js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: npx napi prepublish -t npm --no-test && npx napi artifacts && npm publish
